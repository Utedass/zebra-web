name: Build and Publish Container

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/utedass/zebra-webb:latest \
            -t ghcr.io/utedass/zebra-webb:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/utedass/zebra-webb:latest
