name: Build and Publish Container

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/utedass/zebra-webb:latest \
            -t ghcr.io/utedass/zebra-webb:${VERSION} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/utedass/zebra-webb:latest
          docker push ghcr.io/utedass/zebra-webb:${VERSION}
